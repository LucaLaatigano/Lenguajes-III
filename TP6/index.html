<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tareas de Proyecto</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" />
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
        }

        h1 {
            transition: color 0.2s;
            cursor: default;
        }

        .dataTables_wrapper {
            font-size: 0.9rem;
        }

        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 3px 8px;
            margin-left: 6px;
        }

        table.dataTable thead th {
            background-color: #f3f4f6;
            font-weight: 600;
            font-size: 0.85rem;
        }

        table.dataTable tbody tr:hover {
            background-color: #f9fafb !important;
        }

        #error-msg {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-10">

        <h1 id="titulo" class="text-3xl font-bold text-gray-800 mb-1">Gestor de Tareas de Proyecto</h1>

        <div class="bg-white border border-gray-200 rounded-lg p-6 mb-8 shadow-sm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la tarea</label>
                <input id="inputTarea" type="text" placeholder="Nombre de la tarea..."
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                <p id="error-msg" class="text-red-500 text-xs mt-1">El campo no puede estar vacío.</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
                <select id="selectPrioridad"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Alta">Alta</option>
                    <option value="Media" selected>Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>

            <button id="btnAgregar"
                class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors">
                Agregar
            </button>
        </div>

        <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
            <table id="tablaTareas" class="w-full">
                <thead>
                    <tr>
                        <th>Tarea</th>
                        <th>Prioridad</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
